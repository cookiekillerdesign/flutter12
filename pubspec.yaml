name: birthdayz_alarm
description: Friendly birthday reminder app (Flutter port of Birthdayz Alarm v2).
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  share_plus: ^10.0.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
